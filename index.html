<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球财经日报 — 2026年3月12日</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --border: rgba(255,255,255,0.06);
      --text: #e8e8ed;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.15);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --gold: #f59e0b;
      --gold-dim: rgba(245,158,11,0.12);
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(239,68,68,0.03) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(34,197,94,0.02) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes bgShift {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-2%, 1%); }
      66% { transform: translate(1%, -2%); }
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    header {
      padding: 48px 0 40px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    .brand-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .date-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 20px;
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .date-badge .dot {
      width: 6px;
      height: 6px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #fff 0%, #a5a5c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 17px;
      color: var(--text-dim);
      margin-top: 12px;
      font-weight: 400;
    }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <div class="brand">
          <div class="brand-icon">F</div>
          <span class="brand-text">全球财经日报</span>
        </div>
        <div class="date-badge">
          <span class="dot"></span>
          2026年3月12日 · 星期四
        </div>
      </div>
      <h1>全球市场剧烈震荡<br>油价突破100美元</h1>
      <p class="subtitle">中东局势升级、通胀数据发布、科技板块轮动 — 今日全球金融市场要闻一览</p>
    </header>
